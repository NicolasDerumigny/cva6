adapter driver xlnx_axi_xvc
xlnx_axi_xvc dev_addr 0xA0000000
xlnx_axi_xvc dev_file /dev/mem

transport select jtag

set _CHIPNAME riscv
jtag newtap $_CHIPNAME cpu -irlen 5

set _TARGETNAME $_CHIPNAME.cpu
set _TARGETNAME_0 $_CHIPNAME.cpu0
target create $_TARGETNAME_0 riscv -chain-position $_TARGETNAME -coreid 0
set _TARGETNAME_1 $_CHIPNAME.cpu1
target create $_TARGETNAME_1 riscv -chain-position $_TARGETNAME -coreid 1

gdb report_data_abort enable
gdb report_register_access_error enable

riscv set_reset_timeout_sec 120
riscv set_command_timeout_sec 120

init
halt
echo "Ready for Remote Connections"
